name: Deploy Website

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
      - edited
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jinja2
      - name: Fetch and Generate Posts
        run: |
          export KOALA_TOKEN=${{ secrets.KOALA_TOKEN }}
          python fetch_issues.py
      - name: Deploy to GitHub Pages
        env:
          KOALA_TOKEN: ${{ secrets.KOALA_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone --single-branch --branch gh-pages https://x-access-token:${{ secrets.KOALA_TOKEN }}@github.com/${{ github.repository }} gh-pages
          rsync -av --delete ./posts/ ./gh-pages/
          cd gh-pages
          git add .
          git commit -m "Deploy blog posts [skip ci]"
          git push
