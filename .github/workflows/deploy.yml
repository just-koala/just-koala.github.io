name: Deploy Website

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
      - edited
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libhtmlcxx-dev nlohmann-json3-dev
          sudo apt-get install -y cmake
      - name: Install CPR
        run: |
          git clone https://github.com/whoshuu/cpr.git
          cd cpr
          cmake .
          make
          sudo make install
          sudo ldconfig
      - name: Compile Fetch Issues
        run: g++ -o fetch_issues fetch_issues.cpp -lcpr -lhtmlcxx
      - name: Generate Site
        run: LD_LIBRARY_PATH=/usr/local/lib ./fetch_issues
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./posts
